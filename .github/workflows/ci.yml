name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: enforce coverage floor
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "total coverage: $total%"
          awk -v t="$total" 'BEGIN { exit (t+0 < 85) ? 1 : 0 }' || {
            echo "::error::coverage $total% < 85% floor"
            exit 1
          }

      - name: upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o pooldigital-mock ./cmd/pooldigital-mock

      - uses: actions/upload-artifact@v4
        with:
          name: pooldigital-mock-linux-amd64
          path: pooldigital-mock
          retention-days: 7

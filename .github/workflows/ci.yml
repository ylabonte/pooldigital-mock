name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write    # dorny/test-reporter writes per-test annotations

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: install gotestsum
        shell: bash
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: test (race + coverage + junit)
        shell: bash
        run: |
          mkdir -p test-results
          gotestsum \
            --format pkgname-and-test-fails \
            --junitfile test-results/junit.xml \
            -- -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: enforce coverage floor
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "total coverage: $total%"
          awk -v t="$total" 'BEGIN { exit (t+0 < 85) ? 1 : 0 }' || {
            echo "::error::coverage $total% < 85% floor"
            exit 1
          }

      - name: write test + coverage summary
        if: always() && matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          {
            echo "## Test + coverage"
            echo
            echo "**Total coverage:** ${total}"
            echo
            echo "### Per-package coverage"
            echo
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            awk '
              NR == 1 { next }
              {
                split($1, a, ":")
                file = a[1]
                n = split(file, parts, "/")
                pkg = parts[1]
                for (i = 2; i < n; i++) pkg = pkg "/" parts[i]
                stmts = $2; execs = $3
                total[pkg] += stmts
                if (execs > 0) covered[pkg] += stmts
              }
              END {
                for (p in total) printf "%s\t%.1f\n", p, (covered[p] / total[p]) * 100
              }
            ' coverage.out \
              | sed -E "s|^github\\.com/[^/]+/[^/]+/||" \
              | sort \
              | awk -F'\t' '{ printf "| `%s` | %s%% |\n", $1, $2 }'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload coverage + junit artifact
        if: always() && matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            coverage.out
            test-results/junit.xml
          retention-days: 14

      - name: upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.24'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

      - name: test report (per-test annotations)
        if: always() && hashFiles('test-results/junit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: tests (${{ matrix.os }} / go ${{ matrix.go }})
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o pooldigital-mock ./cmd/pooldigital-mock

      - uses: actions/upload-artifact@v7
        with:
          name: pooldigital-mock-linux-amd64
          path: pooldigital-mock
          retention-days: 7

  docker-edge:
    name: build + push edge image
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ylabonte/pooldigital-mock:edge
            ghcr.io/ylabonte/pooldigital-mock:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=edge-${{ github.sha }}
